services:
  # Gateway Service
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      PATIENT_SERVICE_URL: http://patient-service:4002
      DOCTOR_SERVICE_URL: http://doctor-service:4003
      APPOINTMENT_SERVICE_URL: http://appointment-service:4004
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
      AI_SERVICE_URL: http://ai-service:4006
    env_file:
      - ./gateway-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
    env_file:
      - ./auth-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

  # Patient Service
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      PORT: 4002
    env_file:
      - ./patient-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

  # Doctor Service
  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      PORT: 4003
      APPOINTMENT_SERVICE_URL: http://appointment-service:4004
      PATIENT_SERVICE_URL: http://patient-service:4002
    env_file:
      - ./doctor-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

  # Appointment Service
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: production
      PORT: 4004
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
    env_file:
      - ./appointment-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file:
      - ./notification-service/.env
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: production
      PORT: 4005
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      EMAIL_FROM: "noreply@healthcare.com"
    networks:
      - healthcare-network
    restart: unless-stopped

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: production
      PORT: 4006
      GEMINI_MODEL: gemini-1.5-flash
    env_file:
      - ./ai-service/.env
    networks:
      - healthcare-network
    restart: unless-stopped

networks:
  healthcare-network:
    driver: bridge